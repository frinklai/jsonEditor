<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 樹狀編輯器 (多選、Filter、無閃爍修正版)</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }

        .dragging { opacity: 0.5; border: 2px dashed #3b82f6; }
        .drop-top { border-top: 2px solid #3b82f6 !important; }
        .drop-bottom { border-bottom: 2px solid #3b82f6 !important; }
        .drop-inside { background-color: #eff6ff !important; border: 2px dashed #3b82f6 !important; }

        .value-input:focus { background-color: white; box-shadow: 0 0 0 2px #3b82f6; }
        .value-input:hover { background-color: #f1f5f9; }

        .search-focus {
            box-shadow: 0 0 0 2px #f97316 !important;
            background-color: #ffedd5 !important;
        }

        .selected-node {
            background-color: #dbeafe !important;
            border-color: #60a5fa !important;
            box-shadow: inset 3px 0 0 #2563eb;
        }

        .selected-node-primary {
            background-color: #bfdbfe !important;
            border-color: #2563eb !important;
        }


        /* Tree interaction rendering fix:
           avoid transition-all and reserve row action/type badge space to reduce flicker during expand/collapse. */
        .node-row {
            min-height: 30px;
            transition: background-color 80ms ease, border-color 80ms ease;
            contain: paint;
        }

        .node-type-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 46px;
            opacity: 0;
            visibility: hidden;
        }

        .node-row:hover .node-type-badge,
        .selected-node .node-type-badge {
            opacity: 1;
            visibility: visible;
        }

        .node-actions {
            min-width: 132px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .node-row:hover .node-actions,
        .node-actions-visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen flex flex-col">

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // --- Icons ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                Folder: <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 2H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />,
                FolderOpen: <path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2" />,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
                ChevronRight: <polyline points="9 18 15 12 9 6" />,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                ChevronUp: <polyline points="18 15 12 9 6 15" />,
                Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                Trash2: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                Search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                Edit2: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                GripVertical: <><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>,
                Maximize2: <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
                Minimize2: <><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></>,
                File: <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>,
                Copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></>,
                Clipboard: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></>,
                Info: <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></>,
                CheckSquare: <><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        // --- Util Functions ---
        const getType = (value) => {
            if (Array.isArray(value)) return 'array';
            if (value === null) return 'null';
            if (typeof value === 'object') return 'object';
            if (typeof value === 'number') return Number.isInteger(value) ? 'int' : 'float';
            if (typeof value === 'boolean') return 'boolean';
            return 'string';
        };

        const cloneValue = (value) => JSON.parse(JSON.stringify(value));
        const pathKey = (path) => JSON.stringify(path);
        const pathsEqual = (a, b) => pathKey(a) === pathKey(b);
        const isPathPrefix = (prefix, path) => prefix.length <= path.length && prefix.every((v, i) => v === path[i]);
        const isSameOrDescendant = (path, ancestorPath) => isPathPrefix(ancestorPath, path);
        const isNumericKey = (key) => /^\d+$/.test(String(key));

        const getValueFromPath = (obj, path) => {
            let current = obj;
            for (const key of path) {
                if (current === undefined || current === null) return undefined;
                current = current[key];
            }
            return current;
        };

        const pathExists = (obj, path) => getValueFromPath(obj, path) !== undefined;

        const generateTemplate = (value) => {
            if (Array.isArray(value)) return [];
            if (value === null) return null;
            if (typeof value === 'object') {
                const newObj = {};
                for (const key in value) newObj[key] = generateTemplate(value[key]);
                return newObj;
            }
            if (typeof value === 'number') return 0;
            if (typeof value === 'boolean') return false;
            return "";
        };

        const getDefaultValueByType = (type) => {
            switch(type) {
                case 'string': return "";
                case 'int': return 0;
                case 'float': return 0.0;
                case 'boolean': return false;
                case 'object': return {};
                case 'array': return [];
                default: return "";
            }
        };

        const updateValueInPath = (obj, path, newValue) => {
            if (path.length === 0) return newValue;
            const newObj = Array.isArray(obj) ? [...obj] : { ...obj };
            const key = path[0];
            if (path.length === 1) newObj[key] = newValue;
            else newObj[key] = updateValueInPath(obj[key], path.slice(1), newValue);
            return newObj;
        };

        const renameKeyInPath = (obj, path, newKey) => {
            if (path.length === 0) return obj;
            const parentPath = path.slice(0, -1);
            const oldKey = path[path.length - 1];
            if (parentPath.length === 0) {
                if (Array.isArray(obj)) return obj;
                const newObj = {};
                Object.keys(obj).forEach(k => newObj[k === oldKey ? newKey : k] = obj[k]);
                return newObj;
            }
            const parent = getValueFromPath(obj, parentPath);
            if (!parent || Array.isArray(parent)) return obj;
            const newParent = {};
            Object.keys(parent).forEach(k => newParent[k === oldKey ? newKey : k] = parent[k]);
            return updateValueInPath(obj, parentPath, newParent);
        };

        const deleteValueInPath = (obj, path) => {
            if (path.length === 0) return obj;
            if (Array.isArray(obj)) {
                const index = parseInt(path[0], 10);
                if (path.length === 1) return obj.filter((_, i) => i !== index);
                const newArr = [...obj];
                newArr[index] = deleteValueInPath(obj[index], path.slice(1));
                return newArr;
            }
            const key = path[0];
            if (path.length === 1) {
                const newObj = { ...obj };
                delete newObj[key];
                return newObj;
            }
            const newObj = { ...obj };
            newObj[key] = deleteValueInPath(obj[key], path.slice(1));
            return newObj;
        };

        const addValueInPath = (obj, path, newKey, newValue) => {
            if (path.length === 0) {
                if (Array.isArray(obj)) return [...obj, newValue];
                return { ...obj, [newKey]: newValue };
            }
            const key = path[0];
            const newObj = Array.isArray(obj) ? [...obj] : { ...obj };
            newObj[key] = addValueInPath(obj[key], path.slice(1), newKey, newValue);
            return newObj;
        };

        const getUniqueObjectKey = (obj, baseKey) => {
            const safeBase = String(baseKey || 'item');
            if (!obj || !Object.prototype.hasOwnProperty.call(obj, safeBase)) return safeBase;
            let counter = 1;
            let candidate = `${safeBase}_copy`;
            while (Object.prototype.hasOwnProperty.call(obj, candidate)) {
                counter++;
                candidate = `${safeBase}_copy${counter}`;
            }
            return candidate;
        };

        const removeNestedPaths = (paths) => {
            const unique = Array.from(new Map(paths.map(p => [pathKey(p), p])).values());
            return unique.filter(path => !unique.some(other => other.length < path.length && isPathPrefix(other, path)));
        };

        const sortPathsForDelete = (paths) => {
            return [...paths].sort((a, b) => {
                if (b.length !== a.length) return b.length - a.length;
                const aParent = pathKey(a.slice(0, -1));
                const bParent = pathKey(b.slice(0, -1));
                if (aParent === bParent && isNumericKey(a[a.length - 1]) && isNumericKey(b[b.length - 1])) {
                    return Number(b[b.length - 1]) - Number(a[a.length - 1]);
                }
                return pathKey(b).localeCompare(pathKey(a));
            });
        };

        const deleteMultipleValuesInPaths = (obj, sourcePaths) => {
            const paths = sortPathsForDelete(removeNestedPaths(sourcePaths).filter(p => p.length > 0));
            return paths.reduce((data, path) => deleteValueInPath(data, path), obj);
        };

        const adjustPathAfterDeletes = (targetPath, deletePaths) => {
            let adjusted = [...targetPath];
            const paths = sortPathsForDelete(removeNestedPaths(deletePaths));
            for (const delPath of paths) {
                const parentPath = delPath.slice(0, -1);
                const deleteKey = delPath[delPath.length - 1];
                if (!isPathPrefix(parentPath, adjusted) || adjusted.length <= parentPath.length) continue;
                const targetKey = adjusted[parentPath.length];
                if (isNumericKey(deleteKey) && isNumericKey(targetKey) && Number(deleteKey) < Number(targetKey)) {
                    adjusted[parentPath.length] = String(Number(targetKey) - 1);
                }
            }
            return adjusted;
        };

        const insertItemsRelative = (data, targetPath, placement, items) => {
            if (!items || items.length === 0) return data;

            if (placement === 'inside') {
                const targetValue = getValueFromPath(data, targetPath);
                if (Array.isArray(targetValue)) {
                    return updateValueInPath(data, targetPath, [...targetValue, ...items.map(item => cloneValue(item.data))]);
                }
                if (typeof targetValue === 'object' && targetValue !== null) {
                    const newObj = { ...targetValue };
                    items.forEach(item => {
                        const finalKey = getUniqueObjectKey(newObj, item.key);
                        newObj[finalKey] = cloneValue(item.data);
                    });
                    return updateValueInPath(data, targetPath, newObj);
                }
                return data;
            }

            const parentPath = targetPath.slice(0, -1);
            const currentKey = targetPath[targetPath.length - 1];
            const parent = getValueFromPath(data, parentPath);
            if (parent === undefined) return data;

            if (Array.isArray(parent)) {
                const index = parseInt(currentKey, 10);
                if (Number.isNaN(index)) return data;
                const insertIndex = placement === 'top' ? index : index + 1;
                const newArr = [...parent];
                newArr.splice(insertIndex, 0, ...items.map(item => cloneValue(item.data)));
                return updateValueInPath(data, parentPath, newArr);
            }

            if (typeof parent === 'object' && parent !== null) {
                const entries = Object.entries(parent);
                const newObj = {};
                const usedKeys = { ...parent };
                const prepareInsert = () => items.map(item => {
                    const finalKey = getUniqueObjectKey(usedKeys, item.key);
                    usedKeys[finalKey] = true;
                    return [finalKey, cloneValue(item.data)];
                });
                const insertEntries = prepareInsert();
                for (const [k, v] of entries) {
                    if (k === currentKey && placement === 'top') {
                        insertEntries.forEach(([insertKey, insertValue]) => newObj[insertKey] = insertValue);
                    }
                    newObj[k] = v;
                    if (k === currentKey && placement === 'bottom') {
                        insertEntries.forEach(([insertKey, insertValue]) => newObj[insertKey] = insertValue);
                    }
                }
                return updateValueInPath(data, parentPath, newObj);
            }

            return data;
        };

        const moveManyNodes = (data, sourcePaths, targetPath, placement) => {
            const normalizedSources = removeNestedPaths(sourcePaths).filter(path => path.length > 0 && pathExists(data, path));
            if (normalizedSources.length === 0 || !placement) return data;

            const isInvalidTarget = normalizedSources.some(sourcePath => pathsEqual(sourcePath, targetPath) || isPathPrefix(sourcePath, targetPath));
            if (isInvalidTarget) return data;

            const items = normalizedSources.map(sourcePath => ({
                key: sourcePath[sourcePath.length - 1],
                data: cloneValue(getValueFromPath(data, sourcePath))
            }));

            const adjustedTargetPath = adjustPathAfterDeletes(targetPath, normalizedSources);
            const tempData = deleteMultipleValuesInPaths(data, normalizedSources);
            return insertItemsRelative(tempData, adjustedTargetPath, placement, items);
        };

        const normalizeTerm = (term) => term.trim().toLowerCase();

        const hasDescendantKeyMatch = (value, normalizedTerm) => {
            if (!normalizedTerm || typeof value !== 'object' || value === null) return false;
            return Object.entries(value).some(([key, childValue]) => {
                if (String(key).toLowerCase().includes(normalizedTerm)) return true;
                return hasDescendantKeyMatch(childValue, normalizedTerm);
            });
        };

        const collectFilterMatches = (value, normalizedTerm, path = []) => {
            const matches = [];
            if (!normalizedTerm) return matches;
            if (path.length > 0) {
                const key = path[path.length - 1];
                if (String(key).toLowerCase().includes(normalizedTerm)) matches.push(path);
            }
            if (typeof value === 'object' && value !== null) {
                Object.entries(value).forEach(([key, childValue]) => {
                    matches.push(...collectFilterMatches(childValue, normalizedTerm, [...path, key]));
                });
            }
            return matches;
        };

        const collectFilterVisiblePaths = (nodeKey, value, normalizedTerm, path = [], ancestorMatched = false) => {
            const ownMatches = normalizedTerm && String(nodeKey).toLowerCase().includes(normalizedTerm);
            const descendantMatches = normalizedTerm && hasDescendantKeyMatch(value, normalizedTerm);
            const shouldRender = !normalizedTerm || ancestorMatched || ownMatches || descendantMatches;
            if (!shouldRender) return [];

            const result = [path];
            const forceChildrenVisible = !normalizedTerm || ancestorMatched || ownMatches;
            if (typeof value === 'object' && value !== null) {
                Object.entries(value).forEach(([childKey, childValue]) => {
                    result.push(...collectFilterVisiblePaths(childKey, childValue, normalizedTerm, [...path, childKey], forceChildrenVisible));
                });
            }
            return result;
        };

        const sortPathsByReferenceOrder = (paths, referencePaths) => {
            const order = new Map(referencePaths.map((p, index) => [pathKey(p), index]));
            return [...paths].sort((a, b) => (order.get(pathKey(a)) ?? 999999) - (order.get(pathKey(b)) ?? 999999));
        };

        const replacePathPrefix = (path, oldPrefix, newPrefix) => {
            if (!isPathPrefix(oldPrefix, path)) return path;
            return [...newPrefix, ...path.slice(oldPrefix.length)];
        };

        // --- Components ---
        const ValueEditor = ({ value, type, onChange }) => {
            const [editValue, setEditValue] = useState(value);

            useEffect(() => {
                if (value !== editValue) {
                    const parsed = parseFloat(editValue);
                    if (parsed !== value && editValue !== '' && editValue !== '-') setEditValue(value);
                    else if (value !== 0 && (editValue === '' || editValue === '-')) setEditValue(value);
                    else if (value === 0 && editValue !== 0 && editValue !== '' && editValue !== '-') setEditValue(0);
                }
            }, [value]);

            const handleChange = (val) => {
                setEditValue(val);
                if (val === '' || val === '-') return;

                let parsedVal = val;
                if (type === 'int') {
                    parsedVal = parseInt(val, 10);
                    if (isNaN(parsedVal)) return;
                } else if (type === 'float') {
                    parsedVal = parseFloat(val);
                    if (isNaN(parsedVal)) return;
                } else if (type === 'boolean') {
                    parsedVal = val === 'true';
                }
                onChange(parsedVal);
            };

            if (type === 'boolean') {
                return (
                    <select
                        value={value ? 'true' : 'false'}
                        onChange={(e) => handleChange(e.target.value)}
                        onClick={(e) => e.stopPropagation()}
                        className="value-input h-7 px-2 text-sm border-transparent bg-transparent rounded outline-none focus:border-blue-500 transition-all cursor-pointer hover:bg-slate-200"
                    >
                        <option value="true">True</option>
                        <option value="false">False</option>
                    </select>
                );
            }

            return (
                <input
                    type={type === 'string' ? 'text' : 'number'}
                    step={type === 'float' ? '0.01' : '1'}
                    value={editValue}
                    onChange={(e) => handleChange(e.target.value)}
                    onClick={(e) => e.stopPropagation()}
                    className="value-input w-full h-7 px-2 text-sm border border-transparent bg-transparent rounded outline-none transition-all placeholder-slate-300"
                    placeholder="輸入數值..."
                />
            );
        };

        const TreeNode = ({
            nodeKey,
            value,
            path,
            actions,
            filterTerm,
            ancestorMatchedByFilter = false,
            expandCommand,
            parentType,
            currentMatchPath,
            clipboard,
            selectedPathKeys,
            primarySelectedPath
        }) => {
            const [isExpanded, setIsExpanded] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showPasteModal, setShowPasteModal] = useState(false);
            const [newKey, setNewKey] = useState('');
            const [addPosition, setAddPosition] = useState('child');
            const [showEditModal, setShowEditModal] = useState(false);
            const [editNodeKey, setEditNodeKey] = useState(nodeKey);
            const [editNodeType, setEditNodeType] = useState(getType(value));
            const [dropPosition, setDropPosition] = useState(null);

            const nodeRef = useRef(null);
            const isRoot = path.length === 0;
            const isCurrentFocus = currentMatchPath && pathsEqual(path, currentMatchPath);
            const isContainer = typeof value === 'object' && value !== null;
            const currentType = getType(value);
            const isArray = Array.isArray(value);
            const parentIsArray = parentType === 'array';
            const shouldShowKeyInput = addPosition === 'child' ? !isArray : !parentIsArray;
            const normalizedFilter = normalizeTerm(filterTerm);
            const ownMatchesFilter = normalizedFilter && String(nodeKey).toLowerCase().includes(normalizedFilter);
            const descendantMatchesFilter = normalizedFilter && hasDescendantKeyMatch(value, normalizedFilter);
            const shouldRender = !normalizedFilter || ancestorMatchedByFilter || ownMatchesFilter || descendantMatchesFilter;
            const forceChildrenVisible = !normalizedFilter || ancestorMatchedByFilter || ownMatchesFilter;
            const isSelected = selectedPathKeys.includes(pathKey(path));
            const isPrimarySelected = primarySelectedPath && pathsEqual(path, primarySelectedPath);

            useEffect(() => {
                if (!expandCommand) return;
                if (isSameOrDescendant(path, expandCommand.rootPath)) {
                    setIsExpanded(expandCommand.expand);
                }
            }, [expandCommand ? expandCommand.id : 0]);

            useEffect(() => {
                if (isCurrentFocus && nodeRef.current) {
                    nodeRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, [isCurrentFocus]);

            useEffect(() => {
                if (normalizedFilter && (ancestorMatchedByFilter || ownMatchesFilter || descendantMatchesFilter)) {
                    setIsExpanded(true);
                }
            }, [filterTerm]);

            if (!shouldRender) return null;

            const handleToggle = () => setIsExpanded(!isExpanded);

            const handleRowClick = (e) => {
                if (e.button !== 0) return;
                actions.onSelect(path, e);
            };

            const handleAddChild = () => {
                let targetPath = path;
                let templateValue = "";
                if (addPosition === 'sibling') {
                    targetPath = path.slice(0, -1);
                    templateValue = generateTemplate(value);
                } else {
                    if (isArray && value.length > 0) templateValue = generateTemplate(value[0]);
                    else if (isContainer) templateValue = "";
                    else return;
                }
                if (shouldShowKeyInput && !newKey.trim()) return;
                actions.onAdd(targetPath, newKey, templateValue);
                setNewKey('');
                setShowAddModal(false);
                if (addPosition === 'child') setIsExpanded(true);
            };

            const handlePaste = () => {
                if (!clipboard) return;

                let targetPath = path;
                let pasteKey = newKey;

                if (addPosition === 'sibling') {
                    targetPath = path.slice(0, -1);
                } else if (!isContainer) {
                    return;
                }

                const items = clipboard.items || [{ key: pasteKey || clipboard.key, data: clipboard.data }];

                if (!clipboard.items && shouldShowKeyInput && !pasteKey.trim()) return;
                if (clipboard.items && shouldShowKeyInput && items.length === 1 && !pasteKey.trim()) return;

                const pasteItems = clipboard.items
                    ? items.map((item, index) => ({
                        key: items.length === 1 && pasteKey ? pasteKey : item.key,
                        data: cloneValue(item.data)
                    }))
                    : [{ key: pasteKey, data: cloneValue(clipboard.data) }];

                actions.onPasteMany(targetPath, pasteItems);
                setNewKey('');
                setShowPasteModal(false);
                if (addPosition === 'child') setIsExpanded(true);
            };

            const openPasteModal = (pos) => {
                setAddPosition(pos);
                if (clipboard) {
                    if (clipboard.items && clipboard.items.length > 1) setNewKey('');
                    else setNewKey(clipboard.key ? `${clipboard.key}_copy` : 'new_item');
                }
                setShowPasteModal(true);
            };

            const handleSaveEdit = () => {
                if (!parentIsArray && editNodeKey !== nodeKey && editNodeKey.trim() !== "") {
                    actions.onRename(path, editNodeKey);
                }
                if (editNodeType !== currentType) {
                    const defaultValue = getDefaultValueByType(editNodeType);
                    actions.onUpdate(path, defaultValue);
                }
                setShowEditModal(false);
            };

            const handleDragStart = (e) => {
                e.stopPropagation();
                const sourcePaths = actions.getDragSourcePaths(path);
                e.dataTransfer.setData('sourcePaths', JSON.stringify(sourcePaths));
                e.dataTransfer.effectAllowed = 'move';
                const row = e.target.closest('.node-row');
                if (row) row.classList.add('dragging');
            };

            const handleDragEnd = (e) => {
                const row = e.target.closest('.node-row');
                if (row) row.classList.remove('dragging');
                setDropPosition(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const height = rect.height;
                if (isContainer) {
                    if (y < height * 0.25) setDropPosition('top');
                    else if (y > height * 0.75) setDropPosition('bottom');
                    else setDropPosition('inside');
                } else {
                    if (y < height * 0.5) setDropPosition('top');
                    else setDropPosition('bottom');
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDropPosition(null);
                const sourcePathsStr = e.dataTransfer.getData('sourcePaths');
                if (!sourcePathsStr) return;
                const sourcePaths = JSON.parse(sourcePathsStr);
                if (sourcePaths.some(sourcePath => pathsEqual(sourcePath, path))) return;
                actions.onMoveMany(sourcePaths, path, dropPosition);
            };

            const handleDoubleClick = (e) => {
                e.stopPropagation();
                if (!isRoot && !parentIsArray) {
                    setEditNodeKey(nodeKey);
                    setEditNodeType(currentType);
                    setShowEditModal(true);
                }
            };

            const childEntries = isContainer ? Object.entries(value) : [];

            return (
                <div className="select-none">
                    <div
                        ref={nodeRef}
                        draggable={!isRoot}
                        onDragStart={handleDragStart}
                        onDragEnd={handleDragEnd}
                        onDragOver={handleDragOver}
                        onDragLeave={(e) => { e.preventDefault(); e.stopPropagation(); setDropPosition(null); }}
                        onDrop={handleDrop}
                        onClick={handleRowClick}
                        className={`
                            node-row relative flex items-center gap-2 py-1 px-2 rounded group
                            hover:bg-slate-100 cursor-pointer border border-transparent
                            ${ownMatchesFilter ? 'bg-yellow-100' : ''}
                            ${isCurrentFocus ? 'search-focus' : ''}
                            ${isSelected ? 'selected-node' : ''}
                            ${isPrimarySelected ? 'selected-node-primary' : ''}
                            ${dropPosition === 'top' ? 'drop-top' : ''}
                            ${dropPosition === 'bottom' ? 'drop-bottom' : ''}
                            ${dropPosition === 'inside' ? 'drop-inside' : ''}
                            pr-2
                        `}
                    >
                        {!isRoot && (
                            <div className="text-slate-300 cursor-grab active:cursor-grabbing hover:text-slate-500" title={isSelected ? '拖曳所有已選節點' : '拖曳節點'}>
                                <Icon name="GripVertical" size={12} />
                            </div>
                        )}

                        {isContainer ? (
                            <button onClick={(e) => { e.stopPropagation(); handleToggle(); }} className="text-slate-500 p-0.5" title="展開/收折">
                                <Icon name={isExpanded ? "ChevronDown" : "ChevronRight"} size={16} />
                            </button>
                        ) : (
                            <span className="w-4"></span>
                        )}

                        {isContainer ? (
                            <Icon name={isExpanded ? "FolderOpen" : "Folder"} size={16} className="text-blue-500" />
                        ) : (
                            <Icon name="FileText" size={16} className="text-emerald-500" />
                        )}

                        <span
                            className="font-mono text-sm text-slate-700 font-semibold select-none hover:text-blue-600 transition-colors"
                            onDoubleClick={handleDoubleClick}
                            title={!isRoot && !parentIsArray ? "雙擊編輯 Key" : ""}
                        >
                            {nodeKey}
                        </span>

                        {isSelected && (
                            <span className="text-[10px] text-blue-700 bg-blue-50 border border-blue-200 rounded px-1">
                                {isPrimarySelected ? '目前' : '已選'}
                            </span>
                        )}

                        {isContainer && (
                             <span className="text-slate-400 text-xs">
                                {isArray ? `[${value.length}]` : '{...}'}
                             </span>
                        )}

                        {!isContainer && (
                            <div className="ml-2 w-2/3 max-w-sm">
                                <ValueEditor
                                    value={value}
                                    type={currentType}
                                    onChange={(val) => actions.onUpdate(path, val)}
                                />
                            </div>
                        )}

                        <span className="node-type-badge text-[10px] text-slate-400 px-1 border border-slate-200 rounded ml-2">
                            {currentType}
                        </span>

                        <div className={`node-actions ${isSelected ? 'node-actions-visible' : ''} flex items-center gap-1 ml-2`}>
                             {!isRoot && (
                                <>
                                    <button
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            setEditNodeKey(nodeKey);
                                            setEditNodeType(currentType);
                                            setShowEditModal(true);
                                        }}
                                        className="p-1 hover:bg-yellow-100 rounded text-amber-600"
                                        title="編輯節點 (Key/Type)"
                                    >
                                        <Icon name="Edit2" size={14} />
                                    </button>
                                    <button
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            actions.onCopy(path);
                                        }}
                                        className="p-1 hover:bg-purple-100 rounded text-purple-600"
                                        title={isSelected ? "複製已選節點" : "複製節點"}
                                    >
                                        <Icon name="Copy" size={14} />
                                    </button>
                                </>
                             )}

                            <button
                                onClick={(e) => { e.stopPropagation(); setShowAddModal(true); setAddPosition(isContainer ? 'child' : 'sibling'); }}
                                className="p-1 hover:bg-blue-200 rounded text-blue-600"
                                title="新增節點"
                            >
                                <Icon name="Plus" size={14} />
                            </button>

                            {clipboard && (
                                <button
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        openPasteModal(isContainer ? 'child' : 'sibling');
                                    }}
                                    className="p-1 hover:bg-green-200 rounded text-green-600"
                                    title="貼上節點"
                                >
                                    <Icon name="Clipboard" size={14} />
                                </button>
                            )}

                            {!isRoot && (
                                <button
                                    onClick={(e) => { e.stopPropagation(); actions.onDelete(path); }}
                                    className="p-1 hover:bg-red-200 rounded text-red-600"
                                    title={isSelected ? "刪除已選節點" : "刪除"}
                                >
                                    <Icon name="Trash2" size={14} />
                                </button>
                            )}
                        </div>
                    </div>

                    {showAddModal && (
                        <div className="ml-8 my-2 p-3 bg-white border border-blue-300 shadow-lg rounded animate-fadeIn z-10 relative cursor-default" onClick={e => e.stopPropagation()}>
                            <div className="flex gap-4 mb-2 border-b border-slate-100 pb-2">
                                {isContainer && (
                                    <label className="flex items-center gap-1 text-xs cursor-pointer">
                                        <input type="radio" checked={addPosition === 'child'} onChange={() => setAddPosition('child')} />
                                        新增為子節點
                                    </label>
                                )}
                                {!isRoot && (
                                    <label className="flex items-center gap-1 text-xs cursor-pointer">
                                        <input type="radio" checked={addPosition === 'sibling'} onChange={() => setAddPosition('sibling')} />
                                        新增為兄弟節點
                                    </label>
                                )}
                            </div>
                            <div className="flex items-center gap-2">
                                {shouldShowKeyInput && (
                                    <input
                                        autoFocus type="text" placeholder="Key 名稱" value={newKey}
                                        onChange={(e) => setNewKey(e.target.value)}
                                        className="px-2 py-1 text-sm border rounded outline-none w-32"
                                        onKeyDown={(e) => e.key === 'Enter' && handleAddChild()}
                                    />
                                )}
                                <div className="text-xs text-slate-500 italic">
                                    {addPosition === 'sibling' ? "(複製結構)" : "(複製子結構)"}
                                </div>
                                <button onClick={handleAddChild} className="text-xs bg-blue-600 text-white px-3 py-1 rounded">確定</button>
                                <button onClick={() => setShowAddModal(false)} className="text-xs text-slate-500 px-2">取消</button>
                            </div>
                        </div>
                    )}

                     {showPasteModal && (
                        <div className="ml-8 my-2 p-3 bg-green-50 border border-green-300 shadow-lg rounded animate-fadeIn z-10 relative cursor-default" onClick={e => e.stopPropagation()}>
                            <div className="text-xs font-bold text-green-700 mb-2">
                                貼上節點 {clipboard?.items?.length > 1 ? `(${clipboard.items.length} 個)` : ''}
                            </div>
                            <div className="flex gap-4 mb-2 border-b border-green-200 pb-2">
                                {isContainer && (
                                    <label className="flex items-center gap-1 text-xs cursor-pointer">
                                        <input type="radio" checked={addPosition === 'child'} onChange={() => setAddPosition('child')} />
                                        貼上為子節點
                                    </label>
                                )}
                                {!isRoot && (
                                    <label className="flex items-center gap-1 text-xs cursor-pointer">
                                        <input type="radio" checked={addPosition === 'sibling'} onChange={() => setAddPosition('sibling')} />
                                        貼上為兄弟節點
                                    </label>
                                )}
                            </div>
                            <div className="flex items-center gap-2">
                                {shouldShowKeyInput && (!clipboard?.items || clipboard.items.length === 1) && (
                                    <input
                                        autoFocus type="text" placeholder="新 Key 名稱" value={newKey}
                                        onChange={(e) => setNewKey(e.target.value)}
                                        className="px-2 py-1 text-sm border rounded outline-none w-32"
                                        onKeyDown={(e) => e.key === 'Enter' && handlePaste()}
                                    />
                                )}
                                {shouldShowKeyInput && clipboard?.items?.length > 1 && (
                                    <span className="text-xs text-green-700">多筆貼上會自動處理 Key 重名</span>
                                )}
                                <button onClick={handlePaste} className="text-xs bg-green-600 text-white px-3 py-1 rounded">確認貼上</button>
                                <button onClick={() => setShowPasteModal(false)} className="text-xs text-slate-500 px-2">取消</button>
                            </div>
                        </div>
                    )}

                    {showEditModal && (
                        <div className="ml-8 my-2 p-3 bg-amber-50 border border-amber-300 shadow-lg rounded animate-fadeIn z-10 relative cursor-default" onClick={e => e.stopPropagation()}>
                            <div className="flex flex-col gap-2">
                                <div className="text-xs font-bold text-amber-700 mb-1">編輯節點屬性</div>
                                <div className="flex items-center gap-2">
                                    <label className="text-xs w-8">Key:</label>
                                    <input
                                        type="text"
                                        value={editNodeKey}
                                        onChange={(e) => setEditNodeKey(e.target.value)}
                                        disabled={parentIsArray}
                                        autoFocus
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') handleSaveEdit();
                                            if (e.key === 'Escape') setShowEditModal(false);
                                        }}
                                        className={`px-2 py-1 text-sm border rounded outline-none w-40 ${parentIsArray ? 'bg-slate-100 text-slate-400' : 'bg-white'}`}
                                    />
                                </div>
                                <div className="flex items-center gap-2">
                                    <label className="text-xs w-8">Type:</label>
                                    <select
                                        value={editNodeType}
                                        onChange={(e) => setEditNodeType(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') handleSaveEdit();
                                            if (e.key === 'Escape') setShowEditModal(false);
                                        }}
                                        className="px-2 py-1 text-sm border rounded outline-none w-40 bg-white"
                                    >
                                        <option value="string">String</option>
                                        <option value="int">Integer</option>
                                        <option value="float">Float</option>
                                        <option value="boolean">Boolean</option>
                                        <option value="object">Object</option>
                                        <option value="array">Array</option>
                                    </select>
                                </div>
                                <div className="flex gap-2 mt-1 ml-10 justify-start">
                                    <button onClick={handleSaveEdit} className="text-xs bg-amber-600 text-white px-3 py-1 rounded hover:bg-amber-700">儲存</button>
                                    <button onClick={() => setShowEditModal(false)} className="text-xs text-slate-500 px-2 hover:bg-amber-100 rounded">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isExpanded && isContainer && (
                        <div className="border-l border-slate-200 ml-6 pl-2">
                            {childEntries.map(([childKey, childValue]) => (
                                <TreeNode
                                    key={`${path.join('-')}-${childKey}`}
                                    nodeKey={childKey}
                                    value={childValue}
                                    path={[...path, childKey]}
                                    actions={actions}
                                    filterTerm={filterTerm}
                                    ancestorMatchedByFilter={!!forceChildrenVisible}
                                    expandCommand={expandCommand}
                                    parentType={currentType}
                                    currentMatchPath={currentMatchPath}
                                    clipboard={clipboard}
                                    selectedPathKeys={selectedPathKeys}
                                    primarySelectedPath={primarySelectedPath}
                                />
                            ))}
                            {childEntries.length === 0 && (
                                <div className="pl-6 py-1 text-xs text-slate-400 italic">無子節點 (可拖曳至此)</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [files, setFiles] = useState([
                {
                    id: 'default',
                    name: 'example.json',
                    data: {
                        "users": [
                            { "name": "Alice", "age": 25, "active": true },
                            { "name": "Bob", "age": 30, "active": false }
                        ],
                        "settings": {
                            "theme": "dark",
                            "notifications": 1
                        }
                    }
                }
            ]);
            const [activeFileId, setActiveFileId] = useState('default');
            const activeFile = files.find(f => f.id === activeFileId) || files[0];
            const activeData = activeFile ? activeFile.data : {};

            const [clipboard, setClipboard] = useState(null);
            const [showHelpModal, setShowHelpModal] = useState(false);

            const [filterInput, setFilterInput] = useState('');
            const [filterTerm, setFilterTerm] = useState('');
            const [searchMatches, setSearchMatches] = useState([]);
            const [currentMatchIndex, setCurrentMatchIndex] = useState(-1);
            const [showDownloadModal, setShowDownloadModal] = useState(false);
            const [downloadName, setDownloadName] = useState("");
            const [expandCommand, setExpandCommand] = useState(null);
            const [onlyCurrentExpand, setOnlyCurrentExpand] = useState(false);
            const [selectedPaths, setSelectedPaths] = useState([]);
            const [primarySelectedPath, setPrimarySelectedPath] = useState(null);
            const fileInputRef = useRef(null);

            const normalizedFilterTerm = normalizeTerm(filterTerm);
            const selectedPathKeys = useMemo(() => selectedPaths.map(pathKey), [selectedPaths]);
            const filterVisiblePaths = useMemo(() => collectFilterVisiblePaths('root', activeData, normalizedFilterTerm), [activeData, normalizedFilterTerm]);

            useEffect(() => {
                setFilterInput('');
                setFilterTerm('');
                setSelectedPaths([]);
                setPrimarySelectedPath(null);
                setDownloadName(activeFile ? activeFile.name : "data.json");
            }, [activeFileId]);

            useEffect(() => {
                const stillExisting = selectedPaths.filter(path => pathExists(activeData, path));
                if (stillExisting.length !== selectedPaths.length) {
                    setSelectedPaths(stillExisting);
                    if (primarySelectedPath && !pathExists(activeData, primarySelectedPath)) {
                        setPrimarySelectedPath(stillExisting[stillExisting.length - 1] || null);
                    }
                }
            }, [activeData]);

            useEffect(() => {
                if (!normalizedFilterTerm) {
                    setSearchMatches([]);
                    setCurrentMatchIndex(-1);
                    return;
                }
                const matches = collectFilterMatches(activeData, normalizedFilterTerm);
                setSearchMatches(matches);
                setCurrentMatchIndex(matches.length > 0 ? 0 : -1);
            }, [normalizedFilterTerm, activeData]);

            const handleFileUpload = (event) => {
                const uploadedFiles = Array.from(event.target.files);
                if (uploadedFiles.length === 0) return;
                const newFiles = [];
                let loadedCount = 0;
                uploadedFiles.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const json = JSON.parse(e.target.result);
                            const id = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                            newFiles.push({ id: id, name: file.name, data: json });
                        } catch (error) {
                            alert(`檔案 ${file.name} 不是合法 JSON，已略過。`);
                        } finally {
                            loadedCount++;
                            if (loadedCount === uploadedFiles.length) {
                                setFiles(prev => [...prev, ...newFiles]);
                                if (newFiles.length > 0) setActiveFileId(newFiles[newFiles.length - 1].id);
                            }
                        }
                    };
                    reader.readAsText(file);
                });
                event.target.value = '';
            };

            const closeFile = (e, id) => {
                e.stopPropagation();
                const newFiles = files.filter(f => f.id !== id);
                setFiles(newFiles);
                if (activeFileId === id && newFiles.length > 0) setActiveFileId(newFiles[newFiles.length - 1].id);
            };

            const updateActiveFile = (newData) => {
                setFiles(prev => prev.map(f => f.id === activeFileId ? { ...f, data: newData } : f));
            };

            const applyFilter = () => {
                const nextTerm = filterInput.trim();
                setFilterTerm(nextTerm);
            };

            const clearFilter = () => {
                setFilterInput('');
                setFilterTerm('');
            };

            const getOrderedSelectedPaths = (paths = selectedPaths) => sortPathsByReferenceOrder(paths, filterVisiblePaths);

            const copyPathsToClipboard = (paths) => {
                const validPaths = getOrderedSelectedPaths(paths.filter(path => pathExists(activeData, path)));
                if (validPaths.length === 0) return;
                if (validPaths.length === 1) {
                    const path = validPaths[0];
                    const value = getValueFromPath(activeData, path);
                    const key = path[path.length - 1] || 'root';
                    setClipboard({ data: cloneValue(value), key: key });
                    return;
                }
                setClipboard({
                    items: validPaths.map(path => ({
                        key: path[path.length - 1] || 'root',
                        data: cloneValue(getValueFromPath(activeData, path))
                    }))
                });
            };

            const deletePaths = (paths) => {
                const validPaths = paths.filter(path => path.length > 0 && pathExists(activeData, path));
                if (validPaths.length === 0) return;
                const normalized = removeNestedPaths(validPaths);
                const label = normalized.length > 1 ? `${normalized.length} 個節點` : `節點「${normalized[0][normalized[0].length - 1]}」`;
                if (!confirm(`確定刪除 ${label}？`)) return;
                updateActiveFile(deleteMultipleValuesInPaths(activeData, normalized));
                setSelectedPaths([]);
                setPrimarySelectedPath(null);
            };

            const updateSelectionAfterRename = (oldPath, newKey) => {
                const newPath = [...oldPath.slice(0, -1), newKey];
                setSelectedPaths(prev => prev.map(path => replacePathPrefix(path, oldPath, newPath)));
                setPrimarySelectedPath(prev => prev ? replacePathPrefix(prev, oldPath, newPath) : null);
            };

            const actions = {
                onUpdate: (path, newValue) => updateActiveFile(updateValueInPath(activeData, path, newValue)),
                onRename: (path, newKey) => {
                    updateActiveFile(renameKeyInPath(activeData, path, newKey));
                    updateSelectionAfterRename(path, newKey);
                },
                onDelete: (path) => {
                    if (selectedPathKeys.includes(pathKey(path)) && selectedPaths.length > 1) deletePaths(selectedPaths);
                    else deletePaths([path]);
                },
                onAdd: (path, key, value) => updateActiveFile(addValueInPath(activeData, path, key, value)),
                onPasteMany: (targetPath, items) => updateActiveFile(insertItemsRelative(activeData, targetPath, 'inside', items)),
                onMoveMany: (sources, target, pos) => {
                    const orderedSources = sortPathsByReferenceOrder(sources, filterVisiblePaths);
                    updateActiveFile(moveManyNodes(activeData, orderedSources, target, pos));
                    setSelectedPaths([]);
                    setPrimarySelectedPath(null);
                },
                onCopy: (path) => {
                    if (selectedPathKeys.includes(pathKey(path)) && selectedPaths.length > 1) copyPathsToClipboard(selectedPaths);
                    else copyPathsToClipboard([path]);
                },
                onSelect: (path, e) => {
                    const key = pathKey(path);
                    if ((e.ctrlKey || e.metaKey)) {
                        setSelectedPaths(prev => {
                            const exists = prev.some(p => pathKey(p) === key);
                            if (exists) return prev.filter(p => pathKey(p) !== key);
                            return [...prev, path];
                        });
                        setPrimarySelectedPath(path);
                        return;
                    }

                    if (e.shiftKey && primarySelectedPath) {
                        const start = filterVisiblePaths.findIndex(p => pathsEqual(p, primarySelectedPath));
                        const end = filterVisiblePaths.findIndex(p => pathsEqual(p, path));
                        if (start >= 0 && end >= 0) {
                            const [from, to] = start < end ? [start, end] : [end, start];
                            setSelectedPaths(filterVisiblePaths.slice(from, to + 1));
                            setPrimarySelectedPath(path);
                            return;
                        }
                    }

                    setSelectedPaths([path]);
                    setPrimarySelectedPath(path);
                },
                getDragSourcePaths: (path) => {
                    if (selectedPathKeys.includes(pathKey(path)) && selectedPaths.length > 1) return getOrderedSelectedPaths();
                    setSelectedPaths([path]);
                    setPrimarySelectedPath(path);
                    return [path];
                }
            };

            const nextMatch = () => searchMatches.length && setCurrentMatchIndex(p => (p + 1) % searchMatches.length);
            const prevMatch = () => searchMatches.length && setCurrentMatchIndex(p => (p - 1 + searchMatches.length) % searchMatches.length);
            const currentMatchPath = currentMatchIndex >= 0 ? searchMatches[currentMatchIndex] : null;

            const confirmDownload = () => {
                let filename = downloadName.trim();
                if (!filename.toLowerCase().endsWith('.json')) filename += '.json';
                const blob = new Blob([JSON.stringify(activeData, null, 2)], { type: 'application/json' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setShowDownloadModal(false);
            };

            const triggerExpandAll = (expand) => {
                const targetPath = onlyCurrentExpand && primarySelectedPath ? primarySelectedPath : [];
                setExpandCommand({ id: Date.now() + Math.random(), expand, rootPath: targetPath });
            };

            const selectedCount = selectedPaths.length;
            const selectedLabel = selectedCount > 0
                ? `已選取 ${selectedCount} 個${primarySelectedPath ? `｜目前：${primarySelectedPath.length ? primarySelectedPath[primarySelectedPath.length - 1] : 'root'}` : ''}`
                : '';

            return (
                <div className="flex flex-col h-screen w-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">
                    {/* 下載 Modal */}
                    {showDownloadModal && (
                        <div className="absolute inset-0 bg-black/50 z-50 flex items-center justify-center animate-fadeIn">
                            <div className="bg-white p-6 rounded-lg shadow-xl w-96">
                                <h3 className="text-lg font-bold mb-4">下載設定</h3>
                                <div className="mb-4">
                                    <label className="block text-sm text-slate-600 mb-1">檔案名稱:</label>
                                    <input
                                        type="text"
                                        value={downloadName}
                                        onChange={(e) => setDownloadName(e.target.value)}
                                        className="w-full border border-slate-300 rounded px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500"
                                        onKeyDown={(e) => e.key === 'Enter' && confirmDownload()}
                                    />
                                </div>
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setShowDownloadModal(false)} className="px-4 py-2 text-sm text-slate-500 hover:text-slate-700">取消</button>
                                    <button onClick={confirmDownload} className="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">確認下載</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Help Modal */}
                    {showHelpModal && (
                        <div className="absolute inset-0 bg-black/50 z-50 flex items-center justify-center animate-fadeIn" onClick={() => setShowHelpModal(false)}>
                            <div className="bg-white p-6 rounded-lg shadow-xl w-[560px]" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold">使用說明</h3>
                                    <button onClick={() => setShowHelpModal(false)} className="text-slate-400 hover:text-slate-600"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="space-y-4 text-sm text-slate-600">
                                    <div>
                                        <h4 className="font-bold text-slate-800 mb-1">基本操作</h4>
                                        <ul className="list-disc pl-5 space-y-1">
                                            <li><strong>選取節點：</strong>點擊節點列即可選取。</li>
                                            <li><strong>展開/收折：</strong>點擊箭頭圖示。</li>
                                            <li><strong>編輯數值：</strong>直接點擊數值輸入框進行修改。</li>
                                            <li><strong>更名 Key：</strong>雙擊節點名稱 (Key) 即可編輯，根節點與陣列 index 除外。</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 mb-1">多選與批量操作</h4>
                                        <ul className="list-disc pl-5 space-y-1">
                                            <li><strong>Ctrl 多選：</strong>按住 Ctrl 再點擊多個節點，可加入或移除選取。</li>
                                            <li><strong>Shift 區間多選：</strong>先點第一個節點，再按住 Shift 點第二個節點，會選取中間節點。</li>
                                            <li><strong>批量拖曳：</strong>拖曳任一個已選取節點，會一起拖動所有已選節點。</li>
                                            <li><strong>批量複製/刪除：</strong>使用上方工具列，或在已選節點上按複製/刪除。</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 mb-1">Filter 搜尋</h4>
                                        <ul className="list-disc pl-5 space-y-1">
                                            <li>在搜尋框輸入字串後按 Enter，只顯示 Key 包含該字串的節點。</li>
                                            <li>如果父節點命中，父節點底下所有子節點都會保留顯示。</li>
                                            <li>如果只有子節點命中，會保留必要的父層路徑，讓結果有上下文。</li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="mt-6 text-center">
                                    <button onClick={() => setShowHelpModal(false)} className="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">了解</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white border-b border-slate-200 flex flex-col shrink-0">
                        <div className="p-3 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-2">
                                    <div className="bg-blue-600 text-white p-1.5 rounded-lg">
                                        <Icon name="FileText" size={20} />
                                    </div>
                                    <h1 className="text-lg font-bold text-slate-800 hidden md:block">JSON Editor v1.1.0</h1>
                                </div>
                                <div className="h-6 w-px bg-slate-300 mx-1 hidden sm:block"></div>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-slate-600 border rounded-lg hover:bg-slate-50">
                                    <Icon name="Upload" size={16} /> <span className="hidden sm:inline">讀取</span>
                                </button>
                                <input type="file" ref={fileInputRef} className="hidden" accept=".json" multiple onChange={handleFileUpload} />
                                <button onClick={() => setShowDownloadModal(true)} className="flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm">
                                    <Icon name="Download" size={16} /> <span className="hidden sm:inline">下載</span>
                                </button>
                                <button onClick={() => setShowHelpModal(true)} className="p-1.5 text-blue-500 hover:bg-blue-50 rounded-full" title="使用說明">
                                    <Icon name="Info" size={20} />
                                </button>
                            </div>

                            <div className="flex items-center gap-2">
                                <div className="flex items-center gap-1 bg-slate-50 border border-slate-300 rounded-lg p-0.5">
                                    <div className="relative group px-2 flex items-center">
                                        <Icon name="Search" size={16} className="text-slate-400 group-focus-within:text-blue-500" />
                                        <input
                                            type="text"
                                            placeholder="輸入後按 Enter filter..."
                                            className="ml-2 py-1 text-sm outline-none bg-transparent w-36 md:w-64 transition-all"
                                            value={filterInput}
                                            onChange={(e) => setFilterInput(e.target.value)}
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter') applyFilter();
                                                if (e.key === 'Escape') clearFilter();
                                            }}
                                        />
                                    </div>
                                    <button onClick={applyFilter} className="text-xs px-2 py-1 rounded bg-blue-600 text-white hover:bg-blue-700">Filter</button>
                                    {(filterTerm || filterInput) && (
                                        <button onClick={clearFilter} className="p-1 hover:bg-slate-200 rounded text-slate-500" title="清除 Filter"><Icon name="X" size={14}/></button>
                                    )}
                                    {filterTerm && (
                                        <>
                                            <div className="h-4 w-px bg-slate-300 mx-1"></div>
                                            <span className="text-xs text-slate-500 min-w-[44px] text-center">
                                                {searchMatches.length > 0 ? `${currentMatchIndex + 1}/${searchMatches.length}` : '0'}
                                            </span>
                                            <button onClick={prevMatch} className="p-1 hover:bg-slate-200 rounded"><Icon name="ChevronUp" size={14}/></button>
                                            <button onClick={nextMatch} className="p-1 hover:bg-slate-200 rounded"><Icon name="ChevronDown" size={14}/></button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center px-2 gap-1 overflow-x-auto bg-slate-100 border-t border-slate-200 pt-2 no-scrollbar">
                            {files.map(file => (
                                <div
                                    key={file.id}
                                    onClick={() => setActiveFileId(file.id)}
                                    className={`
                                        group flex items-center gap-2 px-3 py-2 rounded-t-lg text-sm cursor-pointer select-none border-t border-l border-r border-transparent min-w-[120px] max-w-[200px]
                                        ${activeFileId === file.id
                                            ? 'bg-white border-slate-300 text-blue-600 font-medium relative top-[1px] border-b-white z-10'
                                            : 'bg-slate-200 text-slate-600 hover:bg-slate-300 border-b border-slate-300'}
                                    `}
                                >
                                    <Icon name="File" size={14} className={activeFileId === file.id ? "text-blue-500" : "text-slate-400"} />
                                    <span className="truncate flex-1" title={file.name}>{file.name}</span>
                                    <button
                                        onClick={(e) => closeFile(e, file.id)}
                                        className={`p-0.5 rounded-full hover:bg-red-100 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity ${files.length === 1 ? 'hidden' : ''}`}
                                    >
                                        <Icon name="X" size={12} />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col bg-white overflow-hidden relative">
                         <div className="px-4 py-2 border-b border-slate-100 flex gap-2 shrink-0 items-center flex-wrap">
                            <button onClick={() => triggerExpandAll(true)} className="text-xs flex items-center gap-1 bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded shadow-sm hover:bg-slate-50 hover:border-slate-300 transition-all">
                                <Icon name="Maximize2" size={12} /> 全部展開
                            </button>
                            <button onClick={() => triggerExpandAll(false)} className="text-xs flex items-center gap-1 bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded shadow-sm hover:bg-slate-50 hover:border-slate-300 transition-all">
                                <Icon name="Minimize2" size={12} /> 全部收折
                            </button>
                            <label className="text-xs flex items-center gap-1 px-2 py-1.5 rounded border border-slate-200 bg-white cursor-pointer select-none" title="勾選後，全部展開/收折只會套用在目前選取節點底下">
                                <input
                                    type="checkbox"
                                    checked={onlyCurrentExpand}
                                    onChange={(e) => setOnlyCurrentExpand(e.target.checked)}
                                />
                                只展開/收折當前節點
                            </label>

                            {selectedCount > 0 && (
                                <div className="ml-2 flex items-center gap-2 bg-blue-50 px-2 py-1 rounded text-xs text-blue-700 border border-blue-100">
                                    <Icon name="CheckSquare" size={12} />
                                    <span>{selectedLabel}</span>
                                    <button onClick={() => copyPathsToClipboard(selectedPaths)} className="px-2 py-0.5 bg-white border border-blue-200 rounded hover:bg-blue-100 text-blue-700">
                                        批量複製
                                    </button>
                                    <button onClick={() => deletePaths(selectedPaths)} className="px-2 py-0.5 bg-white border border-red-200 rounded hover:bg-red-100 text-red-600">
                                        批量刪除
                                    </button>
                                    <button onClick={() => { setSelectedPaths([]); setPrimarySelectedPath(null); }} className="hover:bg-blue-200 rounded p-0.5" title="清除選取"><Icon name="X" size={10} /></button>
                                </div>
                            )}

                            {clipboard && (
                                <div className="ml-2 flex items-center gap-2 bg-purple-50 px-2 py-1 rounded text-xs text-purple-700 border border-purple-100">
                                    <Icon name="Clipboard" size={12} />
                                    {clipboard.items ? (
                                        <span>已複製: <strong>{clipboard.items.length}</strong> 個節點</span>
                                    ) : (
                                        <span>已複製: <strong>{clipboard.key}</strong> ({getType(clipboard.data)})</span>
                                    )}
                                    <button onClick={() => setClipboard(null)} className="hover:bg-purple-200 rounded p-0.5"><Icon name="X" size={10} /></button>
                                </div>
                            )}
                            <div className="ml-auto text-xs text-slate-400 flex items-center hidden xl:flex">
                                Ctrl 多選 | Shift 區間多選 | 拖曳已選節點可批量移動 | 搜尋框 Enter 套用 Filter
                            </div>
                        </div>

                        {filterTerm && (
                            <div className="px-4 py-1 bg-yellow-50 border-b border-yellow-100 text-xs text-yellow-800 flex items-center gap-2">
                                <Icon name="Search" size={12} />
                                <span>目前 Filter：<strong>{filterTerm}</strong>，命中 {searchMatches.length} 個節點。</span>
                                <button onClick={clearFilter} className="underline hover:text-yellow-900">清除</button>
                            </div>
                        )}

                        <div className="flex-1 overflow-auto p-4 md:p-8">
                            {files.length > 0 ? (
                                <TreeNode
                                    key={activeFileId}
                                    nodeKey="root"
                                    value={activeData}
                                    path={[]}
                                    actions={actions}
                                    filterTerm={filterTerm}
                                    expandCommand={expandCommand}
                                    currentMatchPath={currentMatchPath}
                                    clipboard={clipboard}
                                    selectedPathKeys={selectedPathKeys}
                                    primarySelectedPath={primarySelectedPath}
                                />
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                    <Icon name="FileText" size={48} className="mb-4 opacity-20" />
                                    <p>請點擊「讀取」開啟 JSON 檔案</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
<div id="author-note">Author: Frank</div>
    <style>
    #author-note {
        position: fixed;
        bottom: 8px;
        right: 12px;
        font-size: 12px;
        color: #230adf7a;
        font-style: italic;
        pointer-events: none;
    }
    </style>
</html>
